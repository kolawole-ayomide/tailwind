<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
</head>
<body class="bg-gray-500">
    <div class="flex justify-center items-center min-h-screen m-auto">
        <form action="" class="bg-white p-8 rounded-lg shadow-lg w-96">
            <i class="fa-solid fa-arrow-left text-gray-600 text-xl mb-4"></i>
            <h1 class="text-2xl font-semibold mb-4">Log in</h1>
            <p class="text-sm text-gray-500 mb-4">Don't have an account? <a href="#" class="hover:underline">create account</a></p>
            <div class="mt-4 flex flex-col">
                <label for="Email Address">Email Address</label>
            <input type="email" placeholder="name@gmail.com" class="px-4 rounded-full py-1 border-2 border-solid border-gray-800">
            </div>

            <div class="mt-4 flex flex-col">
                <label for="password">Password</label>
            <input type="password" placeholder="Enter your password" class="px-4 rounded-full py-1 border-2 border-solid border-gray-800">
            </div>
            <a href="#" class="hover:underline text-sm block text-right">forgot password?</a>

          <div class="mt-4">
              <label for="remember" class="flex items-center mb-5">
    <input id="remember" type="checkbox" value="" class="w-4 h-4 border border-default-medium rounded-xs bg-neutral-secondary-medium focus:ring-2 focus:ring-brand-soft" required />
    <p class="ms-2 text-sm font-medium text-heading select-none">I agree with the <a href="#" class="text-fg-brand hover:underline">terms and conditions</a>.</p>
  </label>
          </div>

  <button class="bg-gray-500 rounded-lg px-8 py-1 w-full hover:bg-blue-600">Log in</button>
<div class="flex items-center my-5">
      <hr class="flex-grow border-gray-300">
      <span class="px-3 text-gray-400 text-sm">or</span>
      <hr class="flex-grow border-gray-300">
    </div>

   <div class="flex space-x-4">
                <button class="flex items-center justify-center space-x-2 border-2 border-solid border-gray-800 rounded-lg px-6 py-2 w-full hover:bg-gray-500">
                    <i class="fa-solid fa-g text-lg"></i>
                    <span class="text-sm">Continue with Google</span>
                </button>
                <button class="flex items-center justify-center space-x-2 border-2 border-solid border-gray-800 rounded-lg px-6 py-2 w-full hover:bg-gray-500">
                    <i class="fa-brands fa-apple text-lg"></i>
                    <span class="text-sm">Continue with Apple</span>
                </button>
            </div>
            

        </form>
    </div>
    
</body>
</html>
